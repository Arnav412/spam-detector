<!DOCTYPE html>
<html>

<head>

    <title>Spam Detector</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Spam Detection App</h1>

        <form action="/predict" method="POST">

            <textarea
                name="message"
                placeholder="Enter your message"
                required>
            </textarea>

            <br>

            <button type="submit">
                Predict
            </button>

        </form>

        {% if prediction %}

            <h2>{{ prediction }}</h2>

        {% endif %}

    </div>

</body>

</html>
